<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fff8e7">
  <title>6点大挑战</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <div class="title-row">
        <span class="title-card" aria-hidden="true">6</span>
        <div>
          <p class="eyebrow">快乐数学小游戏</p>
          <h1>6点大挑战</h1>
        </div>
      </div>

      <div class="score-board" aria-live="polite">
        <span aria-hidden="true">⭐</span>
        <span>我的积分</span>
        <strong id="score">0</strong>
      </div>
    </header>

    <section class="rule-card" aria-label="游戏规则">
      <span aria-hidden="true">💡</span>
      <p>想办法接近 6 点，但不能超过 6！你可以继续摸牌，也可以及时停下。</p>
    </section>

    <section class="battle-area" aria-label="对战区域">
      <article class="player-panel player-panel--me" id="playerPanel">
        <div class="player-name">
          <span class="avatar" aria-hidden="true">😃</span>
          <div>
            <span>我的牌</span>
            <small>小小数学家</small>
          </div>
        </div>
        <div class="card-hand" id="playerCards" aria-label="我的牌">
          <div class="playing-card card-back" aria-hidden="true">
            <span class="card-pattern">?</span>
          </div>
        </div>
        <p class="card-total">当前总点数：<strong id="playerTotal">0</strong></p>
      </article>

      <div class="versus" aria-hidden="true">VS</div>

      <article class="player-panel player-panel--computer" id="computerPanel">
        <div class="player-name">
          <span class="avatar" aria-hidden="true">🤖</span>
          <div>
            <span>电脑的牌</span>
            <small>谨慎的小对手</small>
          </div>
        </div>
        <div class="card-hand" id="computerCards" aria-label="电脑的牌">
          <div class="playing-card card-back" aria-hidden="true">
            <span class="card-pattern">?</span>
          </div>
        </div>
        <p class="card-total">当前总点数：<strong id="computerTotal">0</strong></p>
      </article>
    </section>

    <section class="result-box result-box--ready" id="resultBox" aria-live="assertive">
      <span class="result-icon" id="resultIcon" aria-hidden="true">👋</span>
      <div>
        <h2 id="resultTitle">准备好了吗？</h2>
        <p id="resultMessage">先摸一张牌，开始挑战吧！</p>
      </div>
    </section>

    <section class="actions" aria-label="游戏操作">
      <button class="draw-button" id="drawButton" type="button">
        <span aria-hidden="true">🂠</span>
        摸一张
      </button>
      <button class="stop-button is-hidden" id="stopButton" type="button">
        <span aria-hidden="true">✋</span>
        停止摸牌
      </button>
      <button class="next-button is-hidden" id="nextButton" type="button">
        <span aria-hidden="true">✨</span>
        下一局
      </button>
      <button class="reset-button" id="resetButton" type="button">
        <span aria-hidden="true">↻</span>
        重新开始
      </button>
    </section>
  </main>

  <div class="confetti" id="confetti" aria-hidden="true"></div>
  <script src="script.js"></script>
</body>
</html>
